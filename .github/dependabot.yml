version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      # dependabot은 cron("첫째주 월요일")을 지원하지 않음 — monthly = 매월 1일 실행.
      interval: "monthly"
      time: "08:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "config"
      include: "scope"
    labels: ["dependencies", "dependabot"]
    reviewers:
      - qtaghdi
    assignees:
      - qtaghdi

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "08:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    target-branch: "develop"
    commit-message:
      prefix: "deploy"
      include: "scope"
    labels: ["dependencies", "dependabot"]
    reviewers:
      - qtaghdi
    assignees:
      - qtaghdi
